name: Build Storybook

run-name: Build Storybook

env:
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_NAME: ${{ secrets.USER_NAME }}

on:
  push:
    branches: [main, docs]
  pull_request:
    branches: [main, docs]
jobs:
  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: git config user.name '$USER_NAME'
      - run: git config user.email $USER_EMAIL
      - run: yarn install
        working-directory: ./web // folder that contains your storybook, if it is in the ./ folder, there is no need
      - run: yarn build:docs
        working-directory: ./web
      - run: git add .
      - run: git commit -m "docs(build):making the build of storybook"
      - run: git push origin ${{ github.ref }}
